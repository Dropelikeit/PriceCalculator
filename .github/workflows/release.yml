name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Sync Version And Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Calculate next version"
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: master
          dry_run: true

      - name: "Update composer.json version"
        if: steps.tag.outputs.new_tag != ''
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' composer.json > "$tmp"
          mv "$tmp" composer.json

      - name: "Commit version bump"
        if: steps.tag.outputs.new_tag != ''
        env:
          BRANCH: ${{ github.ref_name }}
          TAG: ${{ steps.tag.outputs.new_tag }}
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.json
          if git diff --cached --quiet; then
            echo "composer.json already at version ${VERSION}; nothing to commit."
          else
            git commit -m "chore: sync composer version to ${TAG} [skip ci]"
            git push origin "HEAD:${BRANCH}"
          fi

      - name: "Verify composer.json matches tag version"
        if: steps.tag.outputs.new_tag != ''
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout "${GITHUB_SHA}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          actual_version="$(jq -r '.version // empty' composer.json)"
          if [ -z "$actual_version" ]; then
            echo "composer.json.version is missing."
            exit 1
          fi
          if [ "$actual_version" != "$VERSION" ]; then
            echo "composer.json.version (${actual_version}) does not match expected version (${VERSION})."
            exit 1
          fi

      - name: "Create and push tag"
        if: steps.tag.outputs.new_tag != ''
        env:
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; nothing to do."
            exit 0
          fi
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
